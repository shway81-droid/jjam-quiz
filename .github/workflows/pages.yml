name: Deploy to GitHub Pages

# Pages 소스가 gh-pages 브랜치(branch 빌드)로 설정되어 있음.
# GITHUB_TOKEN은 Pages 사이트 생성(actions 소스 전환) 권한이 없으므로
# main 내용을 gh-pages 브랜치로 발행하는 방식을 사용한다.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump service worker cache version
        # sw.js의 CACHE_NAME을 이번 배포 커밋 SHA로 치환해 캐시를 자동 무효화한다.
        # → 게임/공통 파일을 수정해도 기존 방문자에게 다음 접속 시 반영됨 (수동 +1 불필요).
        run: |
          sed -i "s|const CACHE_NAME = '[^']*';|const CACHE_NAME = 'jjamquiz-${GITHUB_SHA::7}';|" sw.js
          echo "캐시 버전 → $(grep 'const CACHE_NAME' sw.js)"
      - name: Publish to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          touch .nojekyll
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f origin gh-pages
