<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>이어 계산</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">이어 계산</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <div class="intro-illust" aria-hidden="true">
        <svg viewBox="0 0 260 100" width="260" height="100">
          <!-- P1 박스 -->
          <rect x="8" y="18" width="80" height="64" rx="12" fill="#B2DFDB" stroke="#2C2C2C" stroke-width="3"/>
          <text x="48" y="42" text-anchor="middle" font-size="10" font-weight="900" fill="#004D40">P1</text>
          <text x="48" y="64" text-anchor="middle" font-size="16" font-weight="900" fill="#00695C">5+3=□</text>
          <!-- 화살표 -->
          <path d="M92 50 L130 50" stroke="#FF6F00" stroke-width="3" stroke-dasharray="4,3"/>
          <polygon points="130,44 142,50 130,56" fill="#FF6F00"/>
          <!-- 흐름 효과 -->
          <circle cx="107" cy="50" r="4" fill="#FFD54F" stroke="#FF6F00" stroke-width="2"/>
          <!-- P2 박스 -->
          <rect x="146" y="18" width="106" height="64" rx="12" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="199" y="42" text-anchor="middle" font-size="10" font-weight="900" fill="#B71C1C">P2</text>
          <text x="199" y="64" text-anchor="middle" font-size="16" font-weight="900" fill="#C62828">8-2=?</text>
        </svg>
      </div>

      <p class="intro-text">🔗 P1 답 → P2 식에 이어져요!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <span class="rule-num">1</span>
          <span>P1이 첫 번째 식을 계산해요</span>
        </div>
        <div class="rule-item">
          <span class="rule-num">2</span>
          <span>P1 답이 P2 식의 □에 들어가요</span>
        </div>
        <div class="rule-item">
          <span class="rule-num">3</span>
          <span>P2가 이어진 식을 완성해요!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar">
      <div class="top-bar-meta">
        <span class="question-counter" id="roundNum">1/8</span>
        <span class="problem-timer" id="timerEl">90</span>
      </div>
      <div class="chain-score-wrap">
        <span class="chain-score-label">팀 점수</span>
        <span class="chain-score" id="teamScore">0</span>
      </div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <!-- 게임 존 영역 -->
    <div class="zones-wrap p2" id="zonesWrap">
      <!-- P1 존 -->
      <div class="zone zone-p1" data-player="1">
        <div class="zone-header">
          <span class="zone-label z1">P1</span>
          <span class="zone-hint" id="p1Hint">먼저 계산!</span>
        </div>
        <div class="zone-body">
          <div class="chain-eq" id="p1Eq">5 + 3 = □</div>
          <div class="choices-grid" id="p1Choices"></div>
        </div>
      </div>

      <!-- 체인 화살표 -->
      <div class="chain-arrow" id="chainArrow">
        <svg viewBox="0 0 60 40" width="60" height="40">
          <path id="arrowPath" d="M4 20 L44 20" stroke="#FF6F00" stroke-width="3" stroke-dasharray="5,3" fill="none"/>
          <polygon points="44,14 56,20 44,26" fill="#FF6F00"/>
          <circle id="flowDot" cx="4" cy="20" r="5" fill="#FFD54F" stroke="#FF6F00" stroke-width="2"/>
        </svg>
        <div class="chain-value" id="chainValue">?</div>
      </div>

      <!-- P2 존 -->
      <div class="zone zone-p2" data-player="2">
        <div class="zone-header">
          <span class="zone-label z2">P2</span>
          <span class="zone-hint" id="p2Hint">P1 결과를 받아요</span>
        </div>
        <div class="zone-body">
          <div class="chain-eq" id="p2Eq">□ - 2 = ?</div>
          <div class="choices-grid" id="p2Choices"></div>
        </div>
      </div>
    </div>

    <!-- 결과 배너 -->
    <div class="banner" id="banner"></div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header">
      <div></div>
      <h2 class="result-title-header">이어 계산 결과!</h2>
      <div></div>
    </header>
    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="32" fill="#B2DFDB" stroke="#2C2C2C" stroke-width="3"/>
          <text x="40" y="52" text-anchor="middle" font-size="32">🔗</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">0/8 성공</h2>
      <p class="result-sub" id="resultSub">다시 도전!</p>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
