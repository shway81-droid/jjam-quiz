<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>반쪽 맞추기</title>
<link rel="stylesheet" href="../../shared/style.css?v=5">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">반쪽 맞추기</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
  </header>

  <div class="intro-body">
    <div class="intro-demo" aria-hidden="true">
      <!-- Left: P1 sees combo card -->
      <svg viewBox="0 0 80 80" width="78" height="78">
        <rect x="10" y="6" width="60" height="68" rx="10" fill="#fff" stroke="#43A047" stroke-width="3"/>
        <text x="40" y="34" text-anchor="middle" font-size="24">🎩</text>
        <text x="40" y="64" text-anchor="middle" font-size="24">⛄</text>
        <circle cx="66" cy="12" r="6" fill="#2E7D32"/>
        <text x="66" y="15" text-anchor="middle" font-size="8" fill="#fff">👁</text>
      </svg>
      <!-- Speech arrow -->
      <svg viewBox="0 0 50 40" width="40" height="32">
        <path d="M6 20 L38 20 M32 14 L38 20 L32 26" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="25" y="13" text-anchor="middle" font-size="10" font-weight="800" fill="#2E7D32">🗣</text>
      </svg>
      <!-- Right: P2 picks among 4 candidates -->
      <svg viewBox="0 0 80 80" width="78" height="78">
        <rect x="6" y="6" width="68" height="68" rx="8" fill="#1B5E20"/>
        <rect x="12" y="12" width="26" height="26" rx="5" fill="#fff"/>
        <text x="25" y="31" text-anchor="middle" font-size="13">🎩</text>
        <rect x="42" y="12" width="26" height="26" rx="5" fill="#C8E6C9"/>
        <text x="55" y="31" text-anchor="middle" font-size="13">🧢</text>
        <rect x="12" y="42" width="26" height="26" rx="5" fill="#C8E6C9"/>
        <text x="25" y="61" text-anchor="middle" font-size="13">👒</text>
        <rect x="42" y="42" width="26" height="26" rx="5" fill="#C8E6C9"/>
        <text x="55" y="61" text-anchor="middle" font-size="13">👑</text>
        <circle cx="25" cy="25" r="11" fill="none" stroke="#FFD54F" stroke-width="3"/>
      </svg>
    </div>

    <p class="intro-text">그림 조합을 보고 말로 설명!</p>
    <div class="badge-2p">👥 2인 전용</div>
    <p class="intro-subtext">P1이 본 <b>두 그림 조합</b>을 설명하면<br>P2가 4장 중 정답 카드를 찾아요!</p>

    <ul class="intro-rules">
      <li>P1만 보세요: 목표 그림이 8초간 표시</li>
      <li>P1이 말로 설명 → P2가 카드 선택</li>
      <li>비슷한 카드가 섞여 있으니 자세히 설명!</li>
      <li>5라운드, 3번 이상 성공하면 협력 성공!</li>
    </ul>
  </div>
  <button class="btn btn-play" id="playBtn">🧩 PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">
  <div class="game-hud">
    <button class="hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    <span class="hud-round" id="hudRound">1/5</span>
    <div class="hud-timer-track"><div class="hud-timer-fill" id="hudTimerFill" style="width:100%"></div></div>
    <span class="hud-score" id="hudScore">0점</span>
    <button class="hud-sound" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
  </div>

  <div class="banner" id="banner"></div>

  <div class="stage" id="stage">
    <div class="target-wrap" id="targetWrap">
      <div class="target-label" id="targetLabel">🎯 목표 그림</div>
      <div class="combo-card target-card" id="targetCard">
        <div class="combo-emoji combo-top" id="targetTop">❓</div>
        <div class="combo-emoji combo-bottom" id="targetBottom">❓</div>
      </div>
      <div class="target-hint" id="targetHint"></div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="clap-layer" id="clapLayer" aria-hidden="true"></div>

    <div class="role-overlay" id="roleOverlay">
      <div class="role-emoji" id="roleEmoji">👁</div>
      <div class="role-title" id="roleTitle">P1만 보세요!</div>
      <p class="role-desc" id="roleDesc">P2는 잠깐 화면을 보지 마세요!</p>
      <button class="btn role-btn" id="roleBtn">P1 준비 완료!</button>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🎉</div>
  <h2 class="result-headline" id="resultHeadline">협력 성공!</h2>
  <p class="result-sub" id="resultSub">설명이 찰떡같았어요!</p>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">팀 점수</span><span class="stat-val" id="statScore">0/5</span></div>
    <div class="stat-row"><span class="stat-label">연속 성공</span><span class="stat-val" id="statStreak">0회</span></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=12"></script>
<script src="game.js"></script>
</body>
</html>
