<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>다른 낱말 찾기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">다른 낱말 찾기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illus" id="introIllus">
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="20" width="52" height="34" rx="8" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="36" y="42" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C" font-family="sans-serif">사과</text>
          <rect x="74" y="20" width="52" height="34" rx="8" fill="#C8E6C9" stroke="#2C2C2C" stroke-width="3"/>
          <text x="100" y="42" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C" font-family="sans-serif">포도</text>
          <rect x="138" y="20" width="52" height="34" rx="8" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="164" y="42" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C" font-family="sans-serif">딸기</text>
          <rect x="42" y="66" width="52" height="34" rx="8" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="68" y="88" text-anchor="middle" font-size="15" font-weight="900" fill="#C62828" font-family="sans-serif">의자</text>
          <circle cx="138" cy="86" r="17" fill="none" stroke="#7E57C2" stroke-width="5"/>
          <line x1="150" y1="98" x2="166" y2="112" stroke="#7E57C2" stroke-width="6" stroke-linecap="round"/>
          <text x="138" y="92" text-anchor="middle" font-size="18" font-weight="900" fill="#7E57C2" font-family="sans-serif">?</text>
        </svg>
      </div>
      <p class="intro-text">끼리끼리 모인 낱말 중<br>어울리지 않는 하나를 찾아요!</p>
      <p class="intro-subtext">오답 시 -1점 감점! · 10라운드 승부</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <!-- 상단 문제 패널 -->
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 10</div>
        <div class="problem-timer" id="problemTimer">8</div>
      </div>
      <div class="flag-display" id="flagDisplay"></div>
      <div class="problem-status" id="problemStatus"></div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
