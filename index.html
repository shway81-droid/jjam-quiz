  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:image" content="https://shway81-droid.github.io/jjam-quiz/og-image.png">
  <title>짬짬이 퀴즈 — 자투리 시간 문답형 미니게임</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1E7A46">
  <link rel="stylesheet" href="shared/style.css?v=5">
  <style>
    /* ═══ 교실 놀이판 런처 — 보드게임 테이블 ═══ */
    body {
      background:
        radial-gradient(ellipse at 50% -20%, rgba(255,255,255,0.12) 0, transparent 55%),
        radial-gradient(ellipse at 50% 120%, rgba(0,0,0,0.3) 0, transparent 60%),
        var(--felt, #1E7A46);
      min-height: 100vh;
      overflow-y: auto;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 18px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 18px);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 1500px; margin: 0 auto; padding: 0 20px 60px; }

    /* ── 우드 헤더 ── */
    .top-header {
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(180deg, #8D5A2B, #6D4423);
      border: 0; border-bottom: 4px solid #4E2E12;
      box-shadow: 0 6px 0 rgba(0,0,0,0.35);
      border-radius: 0 0 22px 22px;
      padding: 14px 24px;
      margin: 0 -20px 26px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,0.4));
    }
    .logo-mark svg { border-radius: 12px; }
    .logo h1 {
      font-size: 1.7rem; font-weight: 900; color: #FFF8E1;
      text-shadow: 0 3px 0 rgba(0,0,0,0.35);
      letter-spacing: -0.01em;
    }
    .logo .sub { font-size: 0.85rem; color: rgba(255,248,225,0.75); font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    /* ── 룰렛 CTA 버튼 ── */
    .roulette-cta-row { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 26px; }
    .roulette-cta {
      font-family: inherit;
      font-size: 1.6rem; font-weight: 900; color: #2C2C2C;
      background: linear-gradient(180deg, #FFE082, #FFC83D);
      border: 4px solid #2C2C2C;
      border-radius: 999px;
      box-shadow: 0 8px 0 #E8A50C, 0 12px 18px rgba(0,0,0,0.3);
      padding: 20px 64px;
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .roulette-cta:active { transform: translateY(6px); box-shadow: 0 2px 0 #E8A50C; }

    /* ── 카테고리 필터 ── */
    .cat-filter {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .cat-btn {
      padding: 12px 26px;
      border-radius: 999px;
      border: 3px solid #2C2C2C;
      background: #FFF8E1; color: #2C2C2C;
      font-family: inherit; font-size: 1.02rem; font-weight: 900;
      box-shadow: 0 5px 0 rgba(0,0,0,0.4);
      cursor: pointer; transition: transform 0.1s;
    }
    .cat-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
    .cat-btn.active { background: #FFC83D; box-shadow: 0 5px 0 #E8A50C; }

    /* ── 게임 이름 검색 (카테고리 필터와 같은 줄 오른쪽 끝) ── */
    .cat-search {
      display: flex; align-items: center; gap: 6px;
      padding: 0 10px 0 14px;
      border-radius: 999px;
      border: 3px solid #2C2C2C;
      background: #FFF8E1;
      box-shadow: 0 5px 0 rgba(0,0,0,0.4);
    }
    .cat-search:focus-within { background: #fff; }
    .cat-search-icon { font-size: 1rem; }
    .cat-search-input {
      /* 고정 폭 — 포커스 시 확장은 1280px에서 필터 줄이 두 줄로 밀리는 점프를 만들어 안 씀 */
      width: 150px; border: 0; background: transparent; outline: none;
      font-family: inherit; font-size: 1.02rem; font-weight: 900; color: #2C2C2C;
      padding: 12px 0;
    }
    .cat-search-input::placeholder { color: #8a7d5f; font-weight: 700; }
    .cat-search-input::-webkit-search-cancel-button { display: none; }
    .cat-search-clear {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid #2C2C2C; background: #FFC83D; color: #2C2C2C;
      font-size: 0.8rem; font-weight: 900; line-height: 1; padding: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 1px 1px 0 #2C2C2C; -webkit-tap-highlight-color: transparent;
    }
    .cat-search-clear[hidden] { display: none; }

    /* 검색·필터 결과 0개 안내 */
    .grid-empty { text-align: center; padding: 46px 0; }
    .grid-empty[hidden] { display: none; }
    .grid-empty-face { font-size: 3rem; margin-bottom: 12px; }
    .grid-empty-msg {
      color: #FFF8E1; font-weight: 900; font-size: 1.2rem;
      text-shadow: 0 2px 0 rgba(0,0,0,0.3); margin-bottom: 18px;
    }

    /* ── 게임 타일 그리드 ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 22px;
    }
    .game-card {
      display: flex; flex-direction: column;
      background: #FFF8E1;
      border: 3px solid #2C2C2C;
      border-radius: 20px;
      box-shadow: 0 7px 0 rgba(0,0,0,0.4);
      overflow: hidden;
      text-decoration: none;
      color: #2C2C2C;
      transition: transform 0.12s;
    }
    .game-card:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
    .game-card.hidden { display: none; }
    .game-card-thumb {
      position: relative;
      background: var(--thumb-color, #E8F5E9);
      border-bottom: 3px solid #2C2C2C;
      display: flex; align-items: center; justify-content: center;
      height: 120px;
    }
    .card-icon { font-size: 3.4rem; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.15)); }
    .player-badge {
      position: absolute; top: 10px; right: 10px;
      background: #2C2C2C; color: #FFF8E1;
      font-size: 0.75rem; font-weight: 900;
      padding: 4px 10px; border-radius: 999px;
    }
    .game-card-info { padding: 12px 14px 14px; }
    .game-card-name { font-size: 1.15rem; font-weight: 900; }
    .game-card-meta { display: flex; gap: 8px; margin-top: 6px; }
    .meta-chip {
      font-size: 0.78rem; font-weight: 700;
      background: rgba(44,44,44,0.08);
      border-radius: 999px; padding: 3px 9px; color: #5d4f37;
    }

    /* ── 룰렛 오버레이 ── */
    .roulette-overlay {
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(10,40,24,0.88);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 28px;
    }
    .roulette-overlay.active { display: flex; }
    .roulette-frame {
      width: min(620px, 92vw);
      background: linear-gradient(180deg, #8D5A2B, #6D4423);
      border: 5px solid #2C2C2C;
      border-radius: 30px;
      box-shadow: 0 14px 0 rgba(0,0,0,0.5);
      padding: 22px;
    }
    .roulette-title {
      text-align: center; color: #FFF8E1; font-weight: 900; font-size: 1.4rem;
      text-shadow: 0 3px 0 rgba(0,0,0,0.4); margin-bottom: 16px;
    }
    .roulette-window {
      background: #FFF8E1;
      border: 4px solid #2C2C2C;
      border-radius: 20px;
      height: 210px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      overflow: hidden;
      position: relative;
    }
    .roulette-window::before, .roulette-window::after {
      content: ''; position: absolute; left: 0; right: 0; height: 36px; z-index: 2;
      pointer-events: none;
    }
    .roulette-window::before { top: 0; background: linear-gradient(180deg, rgba(0,0,0,0.14), transparent); }
    .roulette-window::after { bottom: 0; background: linear-gradient(0deg, rgba(0,0,0,0.14), transparent); }
    .roulette-icon { font-size: 4.6rem; line-height: 1; }
    .roulette-name { font-size: 1.9rem; font-weight: 900; color: #2C2C2C; }
    .roulette-time { font-size: 1rem; font-weight: 700; color: #7a6a4f; }
    .roulette-window.spinning .roulette-icon,
    .roulette-window.spinning .roulette-name { filter: blur(0.5px); }
    .roulette-window.landed { animation: landBounce 0.45s ease; }
    @keyframes landBounce {
      0% { transform: scale(0.92); } 55% { transform: scale(1.05); } 100% { transform: scale(1); }
    }
    .roulette-actions { display: flex; gap: 16px; justify-content: center; margin-top: 20px; }
    .r-btn {
      font-family: inherit; font-weight: 900; font-size: 1.25rem;
      border: 4px solid #2C2C2C; border-radius: 999px;
      padding: 16px 42px; cursor: pointer; color: #2C2C2C;
      transition: transform 0.1s;
    }
    .r-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 rgba(0,0,0,0.4) !important; }
    .r-btn-start { background: linear-gradient(180deg, #FFD968, #FFC83D); box-shadow: 0 7px 0 #E8A50C; }
    .r-btn-again { background: #FFF8E1; box-shadow: 0 7px 0 rgba(0,0,0,0.4); }
    .r-btn[disabled] { opacity: 0.4; pointer-events: none; }
    .roulette-close {
      position: absolute; top: 22px; right: 26px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #EF5350; color: #fff; font-size: 1.5rem; font-weight: 900;
      border: 4px solid #fff; box-shadow: 0 4px 0 rgba(0,0,0,0.4); cursor: pointer;
    }

    /* 푸터 */
    .footer { text-align: center; margin-top: 44px; color: rgba(255,248,225,0.6); font-size: 0.85rem; font-weight: 700; }
    .footer a { color: rgba(255,248,225,0.85); }

    /* ── 전자칠판 대화면 ── */
    @media (min-width: 1280px) {
      .roulette-cta { font-size: 2rem; padding: 24px 80px; }
      .game-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
      .game-card-name { font-size: 1.3rem; }
    }
    /* ═══ 학생 뽑기 ═══ */
    .pick-cta {
      font-family: inherit; font-size: 1.6rem; font-weight: 900; color: #FFF8E1;
      background: linear-gradient(180deg, #34A853, #1E7A46);
      border: 4px solid #2C2C2C; border-radius: 999px;
      box-shadow: 0 8px 0 #155C34, 0 12px 18px rgba(0,0,0,0.3);
      padding: 20px 48px; cursor: pointer; transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .pick-cta:active { transform: translateY(6px); box-shadow: 0 2px 0 #155C34; }

    /* 학생 뽑기 — 좁은 화면: 팝업 / 넓은 화면(≥1024): 게임 그리드 오른쪽 상시 사이드 패널 */
    .launcher-main { display: block; }
    .student-panel {                       /* 기본(좁은 화면) = 팝업 */
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(10,40,24,0.88); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 20px; overflow-y: auto;
    }
    .student-panel.open { display: flex; }
    .student-card {
      width: min(680px, 94vw); margin: auto;
      background: linear-gradient(180deg, #8D5A2B, #6D4423);
      border: 5px solid #2C2C2C; border-radius: 30px;
      box-shadow: 0 14px 0 rgba(0,0,0,0.5); padding: 22px; position: relative;
    }
    .student-card-close {
      position: absolute; top: -14px; right: -14px; z-index: 2;
      width: 44px; height: 44px; border-radius: 50%;
      background: #fff; border: 3px solid #2C2C2C; box-shadow: 3px 3px 0 #2C2C2C;
      font-size: 1.2rem; font-weight: 900; color: #2C2C2C; cursor: pointer; line-height: 1;
    }
    .student-title {
      text-align: center; color: #FFF8E1; font-weight: 900; font-size: 1.4rem;
      text-shadow: 0 3px 0 rgba(0,0,0,0.4); margin-bottom: 14px;
    }
    /* 설정 */
    .student-setup { background:#FFF8E1; border:4px solid #2C2C2C; border-radius:20px; padding:20px; text-align:center; }
    .student-setup-label { font-size:1.2rem; font-weight:900; color:#2C2C2C; }
    .student-privacy { font-size:0.85rem; font-weight:700; color:#5d4f37; margin-top:6px; }
    .student-setup-row { display:flex; align-items:center; justify-content:center; gap:8px; margin:16px 0; }
    .num-step {
      width:48px; height:48px; border-radius:14px; border:3px solid #2C2C2C; background:#FFC83D; color:#2C2C2C;
      font-size:1.7rem; font-weight:900; cursor:pointer; box-shadow:0 4px 0 #E8A50C; line-height:1;
    }
    .num-step:active { transform:translateY(3px); box-shadow:0 1px 0 #E8A50C; }
    .student-total-input {
      width:96px; height:56px; text-align:center; font-size:1.9rem; font-weight:900; color:#2C2C2C;
      border:3px solid #2C2C2C; border-radius:14px; font-family:inherit; background:#fff;
    }
    .student-unit { font-size:1.2rem; font-weight:900; color:#2C2C2C; }
    /* 뽑기 */
    .pick-controls { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
    .pick-count-label { color:#FFF8E1; font-weight:900; font-size:1.05rem; }
    .pick-count { display:flex; gap:8px; }
    .pcount-btn {
      padding:9px 18px; border-radius:999px; border:3px solid #2C2C2C; background:#FFF8E1; color:#2C2C2C;
      font-family:inherit; font-size:1.02rem; font-weight:900; box-shadow:0 4px 0 rgba(0,0,0,0.4); cursor:pointer;
    }
    .pcount-btn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.4); }
    .pcount-btn.active { background:#FFC83D; box-shadow:0 4px 0 #E8A50C; }
    .pcount-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .draw-btn {
      display:block; width:100%; font-family:inherit; font-size:1.7rem; font-weight:900; color:#2C2C2C;
      background:linear-gradient(180deg,#FFE082,#FFC83D); border:4px solid #2C2C2C; border-radius:18px;
      box-shadow:0 7px 0 #E8A50C; padding:16px; cursor:pointer; transition:transform 0.1s;
    }
    .draw-btn:active { transform:translateY(5px); box-shadow:0 2px 0 #E8A50C; }
    .draw-btn:disabled { opacity:0.6; cursor:default; }
    .draw-result {
      min-height:90px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center;
      background:#FFF8E1; border:4px solid #2C2C2C; border-radius:18px; margin:12px 0; padding:14px;
    }
    .draw-result:empty::before { content:'뽑기! 버튼을 눌러요'; color:#9b8c6e; font-weight:700; }
    .pick-chip {
      min-width:64px; height:64px; padding:0 12px; border-radius:16px; border:3px solid #2C2C2C;
      background:#34A853; color:#fff; font-size:2rem; font-weight:900;
      display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 #155C34;
    }
    .draw-result.rolling .pick-chip { background:#BDBDBD; box-shadow:0 4px 0 #8d8d8d; }
    .pick-chip.pop { animation:chipPop 0.3s ease; }
    @keyframes chipPop { 0%{transform:scale(0.4);} 70%{transform:scale(1.15);} 100%{transform:scale(1);} }
    .pick-status { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; color:#FFF8E1; font-weight:900; }
    #remainInfo { background:rgba(0,0,0,0.25); border-radius:999px; padding:5px 12px; font-size:0.95rem; }
    .num-board {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(42px,1fr)); gap:6px;
      margin-top:12px; background:rgba(255,248,225,0.12); border-radius:14px; padding:9px;
      max-height:30vh; overflow-y:auto;
    }
    .num-cell {
      aspect-ratio:1; min-height:38px; display:flex; align-items:center; justify-content:center;
      border-radius:10px; border:2px solid #2C2C2C; background:#FFF8E1; color:#2C2C2C;
      font-weight:900; font-size:1rem; cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .num-cell.picked { background:#9e9e9e; color:rgba(255,255,255,0.9); opacity:0.55; }
    .num-cell.excluded {
      background:repeating-linear-gradient(45deg,#ded5bf,#ded5bf 5px,#cbc1a6 5px,#cbc1a6 10px);
      color:#8a7d5f; border-style:dashed; text-decoration:line-through; opacity:0.9;
    }
    .board-hint { text-align:center; color:#FFF8E1; font-weight:700; font-size:0.82rem; opacity:0.85; margin-top:8px; }

    /* 넓은 화면: 게임 그리드(왼쪽) + 학생 뽑기 사이드 패널(오른쪽) 2-pane */
    @media (min-width: 1024px) {
      .wrap { max-width: 1760px; }
      .launcher-main { display: flex; gap: 24px; }
      .game-grid { flex: 1; min-width: 0; }
      .student-panel, .student-panel.open {   /* 팝업 → 정적 사이드 패널 */
        position: static; display: block;
        flex: 0 0 360px; width: 360px;
        background: none; backdrop-filter: none; padding: 0; overflow: visible;
      }
      .student-card { position: sticky; top: 18px; width: 100%; margin: 0; }
      .student-card-close { display: none; }   /* 도킹 시 닫기 불필요 */
      #studentCta { display: none; }            /* 패널 상시 노출 → 버튼 숨김 */
      .num-board { max-height: 40vh; }
    }
    @media (min-width: 1280px) {
      .pick-cta { font-size: 2rem; padding: 24px 56px; }
      .student-title { font-size: 1.6rem; }
      .draw-btn { font-size: 1.9rem; }
      .pick-chip { min-width:74px; height:74px; font-size:2.3rem; }
      .num-board { grid-template-columns:repeat(auto-fill, minmax(50px,1fr)); }
      .num-cell { font-size:1.15rem; min-height:46px; }
    }
    /* 즐겨찾기 (⭐) — 상단 가로 띠 */
    .fav-row { margin-bottom: 24px; }
    .fav-row[hidden] { display: none; }
    .fav-label { color:#FFF8E1; font-weight:900; font-size:1.1rem; margin-bottom:10px; text-shadow:0 2px 0 rgba(0,0,0,0.3); }
    .fav-cards { display:flex; gap:12px; overflow-x:auto; padding:2px 2px 8px; }
    .fav-card {

    /* 별 토글 (그리드 카드 + 즐겨찾기 카드 공용) */
    .fav-toggle {
      position:absolute; z-index:3; width:30px; height:30px; border-radius:50%;
      border:2px solid #2C2C2C; background:#fff; color:#2C2C2C; padding:0;
      font-size:0.95rem; line-height:1; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:1px 1px 0 #2C2C2C; -webkit-tap-highlight-color:transparent;
    }
    .fav-toggle.on { background:#FFD54F; }
    .fav-toggle:active { transform:translate(1px,1px); box-shadow:0 0 0 #2C2C2C; }
    .game-card-thumb .fav-toggle { top:8px; left:8px; }
    .fav-card .fav-toggle { top:5px; right:6px; }
    @media (min-width:1280px) {
      .fav-card { width:132px; }

    /* 전체화면 토글 (사운드 토글과 동일 룩, 그 오른쪽) */
    .fs-toggle {
      width: var(--btn-min-touch, 48px); height: var(--btn-min-touch, 48px);
      border-radius: 50%; border: 3px solid var(--ink, #2C2C2C);
      background: var(--board-cream, #FFF8E1); box-shadow: 0 4px 0 rgba(0,0,0,0.4);
      cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: transform 0.1s;
    }
    .fs-toggle:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
    .fs-toggle.on { background: #FFD54F; }
    .fs-toggle svg { display: block; }
    /* 배경음악 토글 (사운드·전체화면과 동일 룩, on이면 노란색) */
    .bgm-toggle-hdr {
      width: var(--btn-min-touch, 48px); height: var(--btn-min-touch, 48px);
      border-radius: 50%; border: 3px solid var(--ink, #2C2C2C);

      cursor: pointer; padding: 0; font-size: 1.3rem; line-height: 1; color: #2C2C2C;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; transition: transform 0.1s;
    }
    .bgm-toggle-hdr:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
    .bgm-toggle-hdr.on { background: #FFD54F; }
  </style>

      {"folder":"eco-save-quiz","name":"지구 지킴이","description":"에너지와 자원을 아끼는 방법을 묻는 문제를 보고 정답을 가장 먼저 맞혀요! 환경 상식 게임","icon":"🌏","color":"#43A047","playTime":"1~2분","category":"knowledge","players":"2-4명"},
    ];

    // ═══ DOM ═══
    var grid = document.getElementById('gameGrid');
    var gridEmpty = document.getElementById('gridEmpty');
    var catBtns = document.querySelectorAll('#catFilter .cat-btn');
    var soundToggle = document.getElementById('soundToggle');
    var allGames = [];
    var currentCat = 'all';
    var currentQuery = '';   // 정규화(소문자·공백 제거)된 검색어

    // ═══ 사운드 토글 (기본 ON) ═══
    // 저장소는 engine.js 헬퍼(_read/_writeSoundMuted)로 통일 — localStorage 영구화 +
    // 구버전 sessionStorage 폴백. 게임 페이지와 동일 로직을 공유한다.
    function updateSoundIcon() {
      soundToggle.textContent = _readSoundMuted() ? '🔇' : '🔊';
    }
    soundToggle.addEventListener('click', function() {
      _writeSoundMuted(!_readSoundMuted());
      updateSoundIcon();
    });
    updateSoundIcon();

    // ═══ 전체화면 토글 (전자칠판용 — 브라우저 메뉴 숨겨 더 크게) ═══
    (function() {
      var fsBtn = document.getElementById('fsToggle');
      if (!fsBtn) return;
      function fsEl() { return document.fullscreenElement || document.webkitFullscreenElement || null; }
      function updateFs() {
        var on = !!fsEl();
        fsBtn.classList.toggle('on', on);
        fsBtn.setAttribute('title', on ? '전체화면 해제' : '전체화면');
        fsBtn.setAttribute('aria-label', on ? '전체화면 해제' : '전체화면');
      }
      fsBtn.addEventListener('click', function() {
        try {
          if (fsEl()) {
            (document.exitFullscreen || document.webkitExitFullscreen).call(document);
          } else {
            var el = document.documentElement;
            (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
          }
        } catch (e) {}
      });
      document.addEventListener('fullscreenchange', updateFs);
      document.addEventListener('webkitfullscreenchange', updateFs);
      updateFs();
    })();

    // ═══ 런처 배경음악 (동물의숲풍 휘파람 = coop 곡) + 헤더 음악 토글 ═══
    (function() {
      if (typeof createBgmManager !== 'function') return;
      var lbgm = createBgmManager();
      lbgm.play('coop');  // 런처 테마 — 섬마을 휘파람(동물의숲풍). bgm-on은 게임과 공유.
      var btn = document.getElementById('bgmToggle');
      if (!btn) return;
      function update() {
        var on = lbgm.isOn();
        btn.classList.toggle('on', on);
        btn.title = on ? '배경음악 끄기' : '배경음악 켜기';
        btn.setAttribute('aria-label', on ? '배경음악 끄기' : '배경음악 켜기');
      }
      btn.addEventListener('click', function() { lbgm.toggle(); update(); });
      update();
    })();

    // ═══ 카드 렌더링 ═══
    function pastelColor(hex) {
      var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      r = Math.round(r + (255 - r) * 0.62);
      g = Math.round(g + (255 - g) * 0.62);
      b = Math.round(b + (255 - b) * 0.62);
      return '#' + [r,g,b].map(function(v){ return v.toString(16).padStart(2,'0'); }).join('');
    }

    // ═══ 즐겨찾기 (⭐, localStorage 영구 저장) ═══
    var FAV_KEY = 'fav-games';
    var favs = [];
    try { favs = JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); if (!Array.isArray(favs)) favs = []; } catch (e) { favs = []; }
    var favRow = document.getElementById('favRow');
    var favCards = document.getElementById('favCards');
    function isFav(f) { return favs.indexOf(f) >= 0; }
    function saveFavs() { try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch (e) {} }
    function toggleFav(f) {
      var i = favs.indexOf(f);
      if (i >= 0) favs.splice(i, 1); else favs.push(f);
      saveFavs();
      refreshFavUI();
    }
    function renderFavRow() {
      favCards.innerHTML = '';
      favs.forEach(function(f) {
        var game = allGames.filter(function(g) { return g.folder === f; })[0];
        if (!game) return;
        var a = document.createElement('a');
        a.className = 'fav-card';
        a.href = 'games/' + game.folder + '/index.html';
        a.setAttribute('aria-label', game.name + ' 게임 시작');
        a.innerHTML =
          '<button class="fav-toggle on" data-folder="' + game.folder + '" aria-label="즐겨찾기 해제" title="즐겨찾기 해제">⭐</button>' +
          '<span class="fav-thumb" style="background:' + pastelColor(game.color) + '">' + game.icon + '</span>' +
          '<span class="fav-name">' + game.name + '</span>';
        favCards.appendChild(a);
      });
      favRow.hidden = favCards.children.length === 0;
    }
    function refreshFavUI() {
      renderFavRow();
      grid.querySelectorAll('.fav-toggle').forEach(function(b) {
        var on = isFav(b.dataset.folder);
        b.classList.toggle('on', on);
        b.textContent = on ? '⭐' : '☆';
      });
    }
    // 별 클릭은 카드 이동을 막고 즐겨찾기만 토글 (그리드·띠 공용, 캡처 단계로 a 네비 차단)
    document.addEventListener('click', function(e) {
      var ft = e.target.closest ? e.target.closest('.fav-toggle') : null;
      if (!ft) return;
      e.preventDefault();
      e.stopPropagation();
      toggleFav(ft.dataset.folder);
    }, true);

    function renderCards(games) {
      grid.innerHTML = '';
      allGames = games;
      games.forEach(function(game) {
        var a = document.createElement('a');
        a.className = 'game-card';
        a.href = 'games/' + game.folder + '/index.html';
        a.setAttribute('aria-label', game.name + ' 게임 시작');
        a.dataset.cat = game.category || 'brain';
        a.dataset.name = game.name;
        var players = game.players || '2-4명';
        a.innerHTML =
          '<div class="game-card-thumb" style="--thumb-color:' + pastelColor(game.color) + '">' +
            '<button class="fav-toggle' + (isFav(game.folder) ? ' on' : '') + '" data-folder="' + game.folder + '" aria-label="즐겨찾기" title="즐겨찾기">' + (isFav(game.folder) ? '⭐' : '☆') + '</button>' +
            '<span class="player-badge">' + players + '</span>' +
            '<span class="card-icon">' + game.icon + '</span>' +
          '</div>' +
          '<div class="game-card-info">' +
            '<div class="game-card-name">' + game.name + '</div>' +
            '<div class="game-card-meta">' +
              '<span class="meta-chip">⏱ ' + game.playTime + '</span>' +
            '</div>' +
          '</div>';
        grid.appendChild(a);
      });
      applyFilters();
      renderFavRow();
    }

    // ═══ 필터 (카테고리 + 이름 검색) ═══
    // 초성 검색: 검색어가 전부 초성(ㄱ~ㅎ)이면 게임 이름의 초성열과 비교 ("ㅍㅅ" → "풍선 터트리기")
    var CHO_LIST = 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
    function normText(s) { return String(s).toLowerCase().replace(/\s+/g, ''); }
    function toChoseong(s) {
      var out = '';
      for (var i = 0; i < s.length; i++) {
        var c = s.charCodeAt(i);
        out += (c >= 0xAC00 && c <= 0xD7A3) ? CHO_LIST.charAt(Math.floor((c - 0xAC00) / 588)) : s.charAt(i);
      }
      return out;
    }
    function matchesQuery(name, q) {
      if (!q) return true;
      var n = normText(name);
      if (n.indexOf(q) >= 0) return true;
      return /^[ㄱ-ㅎ]+$/.test(q) && toChoseong(n).indexOf(q) >= 0;
    }

    function applyFilters() {
      var cards = grid.querySelectorAll('.game-card');
      var visible = 0;
      cards.forEach(function(card) {
        var catOk = (currentCat === 'all') || (card.dataset.cat === currentCat);
        var show = catOk && matchesQuery(card.dataset.name || '', currentQuery);
        card.classList.toggle('hidden', !show);
        if (show) visible++;
      });
      if (gridEmpty) gridEmpty.hidden = !(visible === 0 && cards.length > 0);
    }
    catBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        catBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        applyFilters();
      });
    });

    // ═══ 이름 검색 입력 ═══
    (function() {
      var input = document.getElementById('searchInput');
      var clearBtn = document.getElementById('searchClear');
      var resetBtn = document.getElementById('searchReset');
      if (!input) return;
      function setQuery(v) {
        currentQuery = normText(v);
        clearBtn.hidden = currentQuery === '';
        applyFilters();
      }
      input.addEventListener('input', function() { setQuery(input.value); });
      // 전자칠판 화면 키보드: 엔터로 키보드 내리고 결과 보기
      input.addEventListener('keydown', function(e) { if (e.key === 'Enter') input.blur(); });
      clearBtn.addEventListener('click', function() {
        input.value = ''; setQuery(''); input.focus();
      });
      if (resetBtn) resetBtn.addEventListener('click', function() {
        input.value = ''; currentQuery = ''; clearBtn.hidden = true;
        currentCat = 'all';
        catBtns.forEach(function(b) { b.classList.toggle('active', b.dataset.cat === 'all'); });
        applyFilters();
      });
    })();

    // ═══ 퀵스타트 룰렛 ═══
    var overlay = document.getElementById('rouletteOverlay');
    var rWindow = document.getElementById('rouletteWindow');
    var rIcon = document.getElementById('rouletteIcon');
    var rName = document.getElementById('rouletteName');
    var rTime = document.getElementById('rouletteTime');
    var rTitle = document.getElementById('rouletteTitle');
    var rStart = document.getElementById('rouletteStart');
    var rAgain = document.getElementById('rouletteAgain');
    var rClose = document.getElementById('rouletteClose');
    var spinTimer = null;
    var pickedGame = null;
    var lastPool = [];
    var lastPickFolder = null;

    // 룰렛 풀: 현재 보이는 게임 (카테고리 필터 + 이름 검색과 동일 조건)
    function buildPool() {
      return allGames.filter(function(g) {
        var cat = g.category || 'brain';
        var catOk = currentCat === 'all' || cat === currentCat;
        return catOk && matchesQuery(g.name, currentQuery);
      });
    }

    // 룰렛 효과음 (Web Audio — engine의 createSoundManager 활용)
    var rouletteSound = createSoundManager({
      tick: function(ctx) {
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'square'; o.frequency.value = 660;
        g.gain.setValueAtTime(0.08, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
        o.start(); o.stop(ctx.currentTime + 0.06);
      },
      ding: function(ctx) {
        [523, 659, 784].forEach(function(f, i) {
          var o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sine';
          var t = ctx.currentTime + i * 0.1;
          o.frequency.setValueAtTime(f, t);
          g.gain.setValueAtTime(0.3, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          o.start(t); o.stop(t + 0.35);
        });
      }
    });

    function spin(pool) {
      if (pool.length === 0) {
        rIcon.textContent = '😅';
        rName.textContent = '고를 게임이 없어요';
        rTime.textContent = '잠시 후 다시 시도해 주세요';
        rStart.disabled = true; rAgain.disabled = false;
        return;
      }
      lastPool = pool;
      pickedGame = null;
      rStart.disabled = true;
      rAgain.disabled = true;
      rTitle.textContent = '🎲 게임 룰렛 돌리는 중...';
      if (typeof playDrumroll === 'function') playDrumroll(2.3);
      rWindow.classList.add('spinning');
      rWindow.classList.remove('landed');

      // 최종 당첨 게임 (직전 당첨과 다른 게임 우선)
      var candidates = pool.length > 1 && lastPickFolder
        ? pool.filter(function(g) { return g.folder !== lastPickFolder; })
        : pool;
      var winner = candidates[Math.floor(Math.random() * candidates.length)];

      var elapsed = 0;
      var interval = 70;          // 시작 속도
      var totalMs = 2300;         // 총 스핀 시간

      function step() {
        var g = pool[Math.floor(Math.random() * pool.length)];
        // 마지막 표시는 반드시 당첨 게임
        if (elapsed + interval >= totalMs) g = winner;
        rIcon.textContent = g.icon;
        rName.textContent = g.name;
        rTime.textContent = '⏱ ' + g.playTime + ' · ' + (g.players || '2-4명');
        rouletteSound.play('tick');

        elapsed += interval;
        if (elapsed >= totalMs) {
          land(winner);
          return;
        }
        interval = Math.min(interval * 1.18, 300); // 점점 감속
        spinTimer = setTimeout(step, interval);
      }
      step();
    }

    function land(g) {
      pickedGame = g;
      lastPickFolder = g.folder;
      rWindow.classList.remove('spinning');
      rWindow.classList.add('landed');
      rTitle.textContent = '✨ 오늘의 게임은...';
      rouletteSound.play('ding');
      if (typeof playCymbal === 'function') { playCymbal(); playApplause(1.2); }
      rStart.disabled = false;
      rAgain.disabled = false;
    }

    function openRoulette() {
      overlay.classList.add('active');
      spin(buildPool());
    }
    function closeRoulette() {
      overlay.classList.remove('active');
      if (spinTimer) { clearTimeout(spinTimer); spinTimer = null; }
    }

    document.getElementById('rouletteCta').addEventListener('click', openRoulette);
    rStart.addEventListener('click', function() {
      if (pickedGame) window.location.href = 'games/' + pickedGame.folder + '/index.html';
    });
    rAgain.addEventListener('click', function() { spin(lastPool); });
    rClose.addEventListener('click', closeRoulette);
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeRoulette();
    });

    // ═══ 학생 뽑기 (번호만 · 비복원 · 소진 시 자동 리셋) ═══
    (function() {
      var sPanel = document.getElementById('studentPanel');
      var sSetup = document.getElementById('studentSetup');
      var sPick = document.getElementById('studentPick');
      var totalInput = document.getElementById('totalInput');
      var numBoard = document.getElementById('numBoard');
      var drawResult = document.getElementById('drawResult');
      var remainInfo = document.getElementById('remainInfo');
      var drawBtn = document.getElementById('drawBtn');
      var pickCountWrap = document.getElementById('pickCount');

      var TOTAL_KEY = 'student-total', PICKED_KEY = 'student-picked', EXCLUDED_KEY = 'student-excluded';
      var total = 0;
      var picked = new Set();
      var excluded = new Set();   // 전학·결석 등으로 추첨에서 빠진 번호 (영구·재배치 없음)
      var drawN = 2;
      var sTimer = null;
      var justReset = false;

      function loadState() {
        try {
          total = parseInt(localStorage.getItem(TOTAL_KEY), 10) || 0;
          var raw = JSON.parse(localStorage.getItem(PICKED_KEY) || '[]');
          picked = new Set((raw || []).filter(function(n) { return n >= 1 && n <= total; }));
          var rawX = JSON.parse(localStorage.getItem(EXCLUDED_KEY) || '[]');
          excluded = new Set((rawX || []).filter(function(n) { return n >= 1 && n <= total; }));
        } catch (e) { total = 0; picked = new Set(); excluded = new Set(); }
      }
      function save() {
        try {
          localStorage.setItem(TOTAL_KEY, String(total));
          localStorage.setItem(PICKED_KEY, JSON.stringify(Array.from(picked)));
          localStorage.setItem(EXCLUDED_KEY, JSON.stringify(Array.from(excluded)));
        } catch (e) {}
      }
      function activeCount() { return total - excluded.size; }   // 실제 추첨 대상 인원
      function remainingNums() {
        var r = [];
        for (var i = 1; i <= total; i++) if (!picked.has(i) && !excluded.has(i)) r.push(i);
        return r;
      }
      function renderBoard() {
        numBoard.innerHTML = '';
        for (var i = 1; i <= total; i++) {
          var c = document.createElement('div');
          c.className = 'num-cell' + (picked.has(i) ? ' picked' : '') + (excluded.has(i) ? ' excluded' : '');
          c.dataset.n = i;
          c.textContent = i;
          numBoard.appendChild(c);
        }
      }
      function updateRemain() {
        var rem = remainingNums().length;
        var exTxt = excluded.size ? ' · 제외 ' + excluded.size + '명' : '';
        remainInfo.textContent = '남은 ' + rem + '명 / 전체 ' + activeCount() + '명' + exTxt + (justReset ? ' · 🎉 한 바퀴 완료!' : '');
      }
      function updatePickCountButtons() {
        var active = activeCount();
        var btns = pickCountWrap.querySelectorAll('.pcount-btn');
        btns.forEach(function(b) {
          var n = parseInt(b.dataset.n, 10);
          b.disabled = n > active;
          if (b.disabled) b.classList.remove('active');
        });
        if (!pickCountWrap.querySelector('.pcount-btn.active:not(:disabled)')) {
          var first = pickCountWrap.querySelector('.pcount-btn:not(:disabled)');
          if (first) { first.classList.add('active'); drawN = parseInt(first.dataset.n, 10); }
        }
      }
      function showPickView() {
        sSetup.hidden = true; sPick.hidden = false;
        updatePickCountButtons(); renderBoard(); updateRemain();
      }
      function showSetupView() {
        sPick.hidden = true; sSetup.hidden = false;
        totalInput.value = total || 25;
      }
      function renderChips(nums, rolling) {
        drawResult.className = 'draw-result' + (rolling ? ' rolling' : '');
        drawResult.innerHTML = '';
        nums.forEach(function(n) {
          var chip = document.createElement('div');
          chip.className = 'pick-chip' + (rolling ? '' : ' pop');
          chip.textContent = n;
          drawResult.appendChild(chip);
        });
      }
      function draw() {
        if (activeCount() < 1) return;
        var rem = remainingNums();
        if (rem.length === 0) { picked = new Set(); rem = remainingNums(); }
        var n = Math.min(drawN, rem.length);
        var pool = rem.slice(), chosen = [];
        for (var k = 0; k < n; k++) {
          var idx = Math.floor(Math.random() * pool.length);
          chosen.push(pool[idx]); pool.splice(idx, 1);
        }
        chosen.forEach(function(x) { picked.add(x); });
        justReset = false; save();

        drawBtn.disabled = true;
        if (sTimer) clearTimeout(sTimer);
        if (typeof playDrumroll === 'function') playDrumroll(1.0);
        var flashes = 0, maxFlash = 11;
        function flash() {
          var tmp = [];
          for (var i = 0; i < chosen.length; i++) tmp.push(Math.floor(Math.random() * total) + 1);
          renderChips(tmp, true);
          rouletteSound.play('tick');
          flashes++;
          if (flashes < maxFlash) {
            sTimer = setTimeout(flash, 45 + flashes * 9);
          } else {
            renderChips(chosen, false);
            rouletteSound.play('ding');
            if (typeof playCymbal === 'function') playCymbal();
            if (typeof playApplause === 'function') playApplause(0.9);
            drawBtn.disabled = false;
            if (remainingNums().length === 0) { picked = new Set(); justReset = true; save(); } // 소진 → 자동 리셋
            renderBoard(); updateRemain();
          }
        }
        flash();
      }
      function setTotal(n) {
        n = Math.max(2, Math.min(60, n || 0));
        // 인원 변경 시 뽑기 진행(picked)·제외(excluded)는 유지하고 범위 밖 번호만 정리.
        // → 전입생 추가(인원 +1) 시 진행 중이던 순환이 끊기지 않고, 새 번호만 "아직 안 뽑힘"으로 합류.
        picked = new Set(Array.from(picked).filter(function(x) { return x <= n; }));
        excluded = new Set(Array.from(excluded).filter(function(x) { return x <= n; }));
        justReset = false;
        total = n; save(); showPickView();
      }
      // 패널 내용 초기화 — 페이지 로드 시 1회 (넓은 화면 상시 패널이 바로 채워지도록)
      function init() {
        loadState(); justReset = false;
        drawBtn.disabled = false;
        drawResult.className = 'draw-result'; drawResult.innerHTML = '';
        if (total >= 2) showPickView(); else showSetupView();
      }
      function openPopup() { sPanel.classList.add('open'); }   // 좁은 화면: 팝업 열기
      function closePopup() {
        sPanel.classList.remove('open');
        if (sTimer) { clearTimeout(sTimer); sTimer = null; }
      }

      document.getElementById('studentCta').addEventListener('click', openPopup);
      document.getElementById('studentClose').addEventListener('click', closePopup);
      sPanel.addEventListener('click', function(e) { if (e.target === sPanel) closePopup(); });
      document.getElementById('totalConfirm').addEventListener('click', function() {
        setTotal(parseInt(totalInput.value, 10));
      });
      document.getElementById('totalPlus').addEventListener('click', function() {
        totalInput.value = Math.min(60, (parseInt(totalInput.value, 10) || 0) + 1);
      });
      document.getElementById('totalMinus').addEventListener('click', function() {
        totalInput.value = Math.max(2, (parseInt(totalInput.value, 10) || 0) - 1);
      });
      document.getElementById('changeTotal').addEventListener('click', showSetupView);
      document.getElementById('studentReset').addEventListener('click', function() {
        picked = new Set(); justReset = false; save();
        drawResult.className = 'draw-result'; drawResult.innerHTML = '';
        renderBoard(); updateRemain();
      });
      pickCountWrap.querySelectorAll('.pcount-btn').forEach(function(b) {
        b.addEventListener('click', function() {
          if (b.disabled) return;
          pickCountWrap.querySelectorAll('.pcount-btn').forEach(function(x) { x.classList.remove('active'); });
          b.classList.add('active');
          drawN = parseInt(b.dataset.n, 10);
        });
      });
      // 번호판 탭 → 제외(전학·결석)/복귀 토글. 다른 번호는 그대로 두어 번호 체계가 안 깨짐.
      numBoard.addEventListener('click', function(e) {
        var cell = e.target.closest ? e.target.closest('.num-cell') : null;
        if (!cell) return;
        var n = parseInt(cell.dataset.n, 10);
        if (!(n >= 1 && n <= total)) return;
        if (excluded.has(n)) { excluded.delete(n); }
        else { excluded.add(n); picked.delete(n); }   // 제외하면 이미 뽑힌 표시도 해제(추첨에서 완전히 빠짐)
        justReset = false; save();
        updatePickCountButtons(); renderBoard(); updateRemain();
      });
      drawBtn.addEventListener('click', draw);

      init();   // 로드 시 패널 초기화 (넓은 화면 상시 노출 / 좁은 화면 팝업 모두)
    })();

    // ═══ 게임 목록 로딩 ═══
    async function loadGames() {
      try {
        // cache:'no-cache' — 게임 추가/삭제가 HTTP 캐시에 가려지지 않게 항상 재검증.
        // registry.json(목록)과 games/meta.json(전 게임 메타 통합본)을 병렬 2요청으로 가져온다.
        // 과거엔 game.json을 게임 수만큼(수십 개) 개별 fetch했으나, meta.json 1개로 합쳐 요청 수를 79→2로 줄임.
        var fetched = await Promise.all([
          fetch('games/registry.json', { cache: 'no-cache' }).then(function(r) { return r.json(); }),
          fetch('games/meta.json', { cache: 'no-cache' })
            .then(function(r) { return r.ok ? r.json() : []; })
            .catch(function() { return []; })
        ]);
        var folders = fetched[0];
        var metaByFolder = {};
        fetched[1].forEach(function(m) { metaByFolder[m.folder] = m; });
        // registry 순서를 기준으로 메타 매핑. meta.json에 없는 폴더(신규 추가 후 gen 누락 등)만 개별 폴백.
        var games = await Promise.all(folders.map(function(folder) {
          if (metaByFolder[folder]) return metaByFolder[folder];
          return fetch('games/' + folder + '/game.json', { cache: 'no-cache' })
            .then(function(r) { if (!r.ok) throw new Error(folder); return r.json(); })
            .then(function(meta) { meta.folder = folder; return meta; })
            .catch(function() { console.warn('Failed to load:', folder); return null; });
        }));
        var validGames = games.filter(function(g) { return g !== null; });
        renderCards(validGames.length ? validGames : FALLBACK_GAMES);
      } catch (e) {
        renderCards(FALLBACK_GAMES);
      }
    }

    // 엔진 로드 확인
    if (typeof createTimer !== 'function' || typeof onTap !== 'function') {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h1>오류</h1><p>게임 엔진을 불러오지 못했습니다.<br>새로고침해주세요.</p><button onclick="location.reload()" style="padding:12px 24px;background:#1E7A46;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">새로고침</button></div>';
    } else {
      loadGames();
    }

    // 오프라인 지원
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
